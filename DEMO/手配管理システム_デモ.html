<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手配管理システム デモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans','Meiryo',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;min-height:100vh;background:#1e3a5f;color:white;display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:white;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;padding:24px;overflow-y:auto}

/* Sidebar */
.sb-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo h1{font-size:15px;font-weight:700;color:white;line-height:1.3}
.sb-logo p{font-size:11px;color:#93c5fd;margin-top:2px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-section{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 4px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#bfdbfe;margin-bottom:1px;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,.1);color:white}
.sb-item.active{background:#2563eb;color:white;font-weight:600}
.sb-item .icon{width:18px;text-align:center;font-size:14px}
.sb-footer{padding:12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sb-user-info p{font-size:12px;color:white;font-weight:600}
.sb-user-info span{font-size:10px;color:#93c5fd}
.mode-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.1);border-radius:8px;cursor:pointer;font-size:12px;color:#bfdbfe;margin:8px}
.mode-toggle:hover{background:rgba(255,255,255,.15)}

/* Staff portal */
#staff-portal{display:none;flex-direction:column;min-height:100vh;background:#f0fdf4}
#staff-topbar{background:#15803d;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
#staff-content{flex:1;padding:16px;overflow-y:auto;padding-bottom:80px}
#staff-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;display:flex;z-index:100}
.staff-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:#64748b;font-size:10px;gap:2px;border-top:3px solid transparent;transition:all .15s}
.staff-nav-item.active{color:#15803d;border-top-color:#15803d}
.staff-nav-item .s-icon{font-size:20px}

/* Cards */
.card{background:white;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600;color:#334155}
.card-body{padding:16px}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-label{font-size:12px;color:#64748b;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:#94a3b8;margin-top:4px;cursor:pointer;color:#3b82f6}
.stat-sub:hover{text-decoration:underline}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.tbl td{padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.tbl tr.clickable{cursor:pointer}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-orange{background:#ffedd5;color:#c2410c}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-purple{background:#f3e8ff;color:#7c3aed}
.badge-gray{background:#f1f5f9;color:#475569}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#1d4ed8;color:white}.btn-primary:hover{background:#1e40af}
.btn-success{background:#15803d;color:white}.btn-success:hover{background:#166534}
.btn-outline{background:white;color:#374151;border:1px solid #d1d5db}.btn-outline:hover{background:#f9fafb}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid transparent}.btn-ghost:hover{background:#f3f4f6}
.btn-danger{background:#dc2626;color:white}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 10px;font-size:12px}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px}
.form-input{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;transition:border .15s;background:white}
.form-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-select{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:white;outline:none}
.form-select:focus{border-color:#3b82f6}

/* Arrangement Grid */
.grid-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.arr-table{border-collapse:collapse;white-space:nowrap;width:100%}
.arr-table th{background:#1e3a5f;color:white;padding:5px 3px;text-align:center;font-size:11px;font-weight:600;border:1px solid #1e4080;position:sticky;top:0;z-index:10}
.arr-table th.sun{background:#b91c1c}
.arr-table th.sat{background:#1d4ed8}
.arr-table th.name-col{text-align:left;padding-left:10px;position:sticky;left:0;z-index:20;min-width:110px;background:#1e3a5f}
.arr-table td{border:1px solid #e2e8f0;padding:0;width:30px;height:30px;text-align:center;cursor:pointer;transition:background .1s}
.arr-table td.name-cell{padding:0 10px;background:#f8fafc;font-size:12px;font-weight:500;position:sticky;left:0;z-index:5;border-right:2px solid #94a3b8;min-width:110px;cursor:default}
.arr-table td.arr-off{background:white}.arr-table td.arr-off:hover{background:#eff6ff}
.arr-table td.arr-on{background:#bfdbfe}.arr-table td.arr-on:hover{background:#93c5fd}
.arr-table td.arr-confirmed{background:#bbf7d0}
.arr-table td.arr-sun{background:#fff1f2}.arr-table td.arr-sat{background:#eff6ff}
.arr-check{color:#1d4ed8;font-size:14px;font-weight:700}
.arr-confirmed-mark{color:#15803d;font-size:14px;font-weight:700}
.arr-table td.arr-on.arr-sun,.arr-table td.arr-on.arr-sat{background:#bfdbfe}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .2s}
.modal-overlay.open{opacity:1}
.modal{background:white;border-radius:16px;width:100%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{font-size:20px;color:#94a3b8;cursor:pointer;background:none;border:none;line-height:1}.modal-close:hover{color:#374151}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* Report entry */
.qty-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9}
.qty-row:last-child{border-bottom:none}
.qty-controls{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid #d1d5db;background:white;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#374151}
.qty-btn:hover{background:#f3f4f6}
.qty-input{width:50px;text-align:center;border:1px solid #d1d5db;border-radius:6px;padding:4px;font-size:14px;font-weight:600}

/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:18px;font-weight:700;color:#0f172a}
.page-subtitle{font-size:12px;color:#64748b;margin-top:2px}

/* Filters */
.filter-bar{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar label{font-size:11px;color:#64748b;font-weight:600}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:#94a3b8}
.empty .e-icon{font-size:40px;margin-bottom:8px}
.empty p{font-size:13px}

/* Staff report steps */
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.step{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;font-weight:600}
.step.active{color:#15803d}
.step.done{color:#94a3b8}
.step-dot{width:22px;height:22px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step.active .step-dot{background:#15803d;border-color:#15803d;color:white}
.step.done .step-dot{background:#e2e8f0;border-color:#e2e8f0;color:#64748b}
.step-line{flex:1;height:1px;background:#e2e8f0}

/* Toolbar notice */
.notice{background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 14px;font-size:12px;color:#713f12;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Quick actions */
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.qa-item{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.qa-item:hover{border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,.15);transform:translateY(-1px)}
.qa-icon{font-size:24px;margin-bottom:6px}
.qa-label{font-size:11px;font-weight:600;color:#374151}

/* Receipt confirm */
.receipt-card{background:white;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:10px}
.receipt-head{background:#f8fafc;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0}
.receipt-rows td{padding:8px 14px;font-size:12px;border-bottom:1px solid #f1f5f9}
.receipt-rows td:last-child{text-align:right;font-weight:600}

/* Payment notice */
.pn-year-header{background:#f8fafc;border-radius:8px;padding:8px 14px;font-weight:700;color:#374155;margin-bottom:4px;margin-top:12px;font-size:13px}
.pn-row{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}
.pn-row:hover{border-color:#3b82f6;box-shadow:0 1px 4px rgba(59,130,246,.1)}

/* Demo banner */
.demo-banner{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;text-align:center;padding:6px;font-size:11px;font-weight:600;letter-spacing:.05em}

/* Responsive */
@media(max-width:768px){
  #sidebar{display:none}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .quick-actions{grid-template-columns:repeat(2,1fr)}
}

/* Print hidden */
.no-print{}
</style>
</head>

</div>

<!-- ========== STAFF PORTAL ========== -->

      <div style="font-size:15px;font-weight:700">スタッフポータル</div>

    <div class="staff-nav-item" id="snav-notice" onclick="showStaffPage('s-notices')"><div class="s-icon">💴</div>支払通知書</div>
    <div class="staff-nav-item" id="snav-profile" onclick="showStaffPage('s-profile')"><div class="s-icon">⚙️</div>設定</div>
  </nav>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

window._pendingChanges = {};
function toggleCell(sid, day){
  const key = `${sid}-${day}`;
  const cur = ARR_DATA[selectedProject]?.[sid]?.[day];
  if(!ARR_DATA[selectedProject]) ARR_DATA[selectedProject]={};
  if(!ARR_DATA[selectedProject][sid]) ARR_DATA[selectedProject][sid]={};
  if(cur==='arranged'){
    delete ARR_DATA[selectedProject][sid][day];
    window._pendingChanges[key]='removed';
  } else if(cur==='confirmed'){
    // keep
  } else {
    ARR_DATA[selectedProject][sid][day]='arranged';
    window._pendingChanges[key]='added';
  }
  render();
}
function prevMonth(){if(currentMonth.m===1){currentMonth.y--;currentMonth.m=12;}else currentMonth.m--;render();}
function nextMonth(){if(currentMonth.m===12){currentMonth.y++;currentMonth.m=1;}else currentMonth.m++;render();}

  },300);
}

    let basePay=0, baseClient=0;

        const isMain=MAIN_ITEMS.includes(item);

        if(hasStaff){
          cells+=`<td style="text-align:center;padding:3px 2px;background:#dcfce7;border-right:1px solid #d1fae5;">
            <span style="font-size:13px;font-weight:700;color:#166534;">${qty}</span>
          </td>`;
        } else {
          const eid='bce_'+bn.replace(/[^a-z0-9]/gi,'_')+'_'+s.name.replace(/[^a-z0-9]/gi,'_')+'_'+item.replace(/[^a-z0-9]/gi,'_');
          cells+=`<td style="text-align:center;padding:2px;border-right:1px solid #e2e8f0;">

      }
      basePay+=rowPay;
      staffRows+=`<tr style="border-bottom:1px solid #f3f4f6;">
        <td style="position:sticky;left:0;background:#fff;z-index:1;padding:5px 8px;white-space:nowrap;border-right:2px solid #e2e8f0;min-width:90px;">
          ${staffCell(s.name)}

        ${cells}
        <td style="text-align:right;padding:5px 8px;font-weight:700;color:#7c3aed;white-space:nowrap;border-left:2px solid #e2e8f0;font-size:13px;">¥${Math.round(rowPay).toLocaleString()}</td>
      </tr>`;
    }

    grandPay+=basePay; grandClient+=baseClient;

    cards+=`
<div style="background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:18px;overflow:hidden;">
  <div style="padding:11px 16px;background:#1e40af;color:white;display:flex;justify-content:space-between;align-items:center;">

  return `

  <div style="display:inline-flex;gap:6px;flex-wrap:wrap;">${dayBtns}</div>
  <span style="margin-left:auto;font-weight:700;color:#1e40af;font-size:14px;">全拠点支払計 ¥${Math.round(grandPay).toLocaleString()}</span>
</div>
<div style="background:#eff6ff;border-radius:8px;padding:8px 14px;margin-bottom:16px;font-size:12px;color:#1e40af;display:flex;align-items:center;gap:8px;">
  <span>⌨️</span>
  <span>Enterキーで次の入力セルへ移動　</span>
  <span style="background:#dcfce7;color:#166534;border-radius:4px;padding:1px 6px;">緑 = スタッフ入力済（自動反映）</span>
  <span style="background:#fff7ed;color:#f97316;border-radius:4px;padding:1px 6px;">橙枠 = 管理者入力</span>

          <th style="position:sticky;left:0;background:#f8fafc;z-index:2;padding:5px 8px;text-align:left;font-size:12px;border-right:2px solid #e2e8f0;border-bottom:2px solid #e2e8f0;min-width:80px;">スタッフ</th>

// ── 日別ビュー ─────────────────────────────────────────────────────────────────
function renderDailyView(sortedDays){
  const day=baseCountsDay;
  function getItemsForBase(bn){
    if(bn==='宇品郵便局') return ['配達完了①','配達完了②','転居大口等①','転居大口等②','夜間配送','大配送','集荷①','集荷②','尋ねあたらず','その他事故'];
    return ['配達完了①','転居大口等①','夜間配送','大配送','集荷①','集荷②','尋ねあたらず','その他事故'];
  }
  function aKey(bn,name,item){ return bn+'__'+name+'__'+item; }

  let baseCards='', grandClientTotal=0;
  const summaryRows=[];

  for(const bn of BASE_ORDER2){
    const bd=BASE_FULL_DATA[bn];
    const prices=UNIT_PRICES[bn]||{};
    const clientPrices=prices.client||{};
    const staffPrices=prices.staff||{};
    const items=getItemsForBase(bn);
    const staffList=(bd?.staff||[]);
    const staffDayData=staffList.map(s=>({name:s.name,data:(s.daily||{})[day]||{}})).filter(s=>s.name);
    const baseTotals={};
    for(const item of items) baseTotals[item]=0;

    let staffRows='', baseClientAmt=0;
    for(const sd of staffDayData){
      let staffPayAmt=0; let cells='';
      const sc=getStaffCond(sd.name);
      const indivUnitPrice=sc.unitPrice||null;
      for(const item of items){
        const staffVal=sd.data[item];
        const hasStaffInput=(staffVal!==undefined&&staffVal!==null&&staffVal!=='');
        const adminVal=adminInputs[aKey(bn,sd.name,item)];
        let qty=hasStaffInput?Number(staffVal):(adminVal!==undefined?Number(adminVal):0);
        baseTotals[item]=(baseTotals[item]||0)+qty;
        const isMainItem=['配達完了①','配達完了②','転居大口等①','転居大口等②','尋ねあたらず','その他事故'].includes(item);
        const sprice=(isMainItem&&indivUnitPrice)?indivUnitPrice:(staffPrices[item]||0);
        staffPayAmt+=qty*sprice;
        if(hasStaffInput){
          cells+=`<td style="text-align:center;padding:3px 4px;background:#dcfce7;">
            <span style="font-size:13px;font-weight:600;color:#166534;">${qty}</span>
          </td>`;
        } else {
          cells+=`<td style="text-align:center;padding:2px 4px;">
            <input type="number" min="0" value="${adminVal!==undefined?adminVal:''}" placeholder="0"
              style="width:52px;padding:3px 2px;border:1px solid #fb923c;border-radius:3px;text-align:center;font-size:12px;background:#fff7ed;"
              onchange="adminInputs['${aKey(bn,sd.name,item)}']=this.value;render();" onfocus="this.select();">
          </td>`;
        }
      }
      staffRows+=`<tr style="border-bottom:1px solid #f3f4f6;">
        <td style="padding:5px 8px;white-space:nowrap;font-size:12px;border-right:1px solid #e2e8f0;">
          <div style="font-weight:600;">${sd.name.replace(/[（(][^）)]+[）)]/g,'').trim()}</div>
          ${(()=>{const c=getCorpForStaff(sd.name);return c?`<span style="font-size:9px;color:${c.color};background:${c.bg};border-radius:3px;padding:0 4px;">${c.label.replace(/株式会社|合同会社/g,'').trim()}</span>`:''})()}
        </td>
        ${cells}
        <td style="text-align:right;padding:5px 8px;font-weight:700;color:#7c3aed;white-space:nowrap;font-size:13px;">¥${Math.round(staffPayAmt).toLocaleString()}</td>
      </tr>`;
    }
    let totalCells='';
    for(const item of items){
      const qty=baseTotals[item]||0;
      const cprice=clientPrices[item]||0;
      baseClientAmt+=qty*cprice;
      totalCells+=`<td style="text-align:center;padding:4px 4px;font-weight:700;background:#f0f9ff;font-size:13px;">${qty}</td>`;
    }
    grandClientTotal+=baseClientAmt;

function renderRangeView(sortedDays){
  const from=Number(baseRangeFrom||1), to=Number(baseRangeTo||31);

    if(bn==='宇品郵便局') return ['配達完了①','配達完了②','転居大口等①','転居大口等②','夜間配送','大配送','集荷①','集荷②','尋ねあたらず','その他事故'];
    return ['配達完了①','転居大口等①','夜間配送','大配送','集荷①','集荷②','尋ねあたらず','その他事故'];
  }
  let cards='', grandTotal=0;
  for(const bn of BASE_ORDER2){
    const bd=BASE_FULL_DATA[bn]; if(!bd) continue;
    const prices=UNIT_PRICES[bn]||{};
    const clientPrices=prices.client||{};
    const items=getItemsForBase(bn);
    const staffList=(bd.staff||[]).filter(s=>s.name);
    let baseAmt=0;
    let staffRows=staffList.map(s=>{
      const counts=sumCountsFromBFData(s.name, String(from), String(to))||{};
      const sc=getStaffCond(s.name);
      let pay=0, cells='';
      for(const item of items){
        const qty=counts[item]||0;
        const isMain=['配達完了①','配達完了②','転居大口等①','転居大口等②','尋ねあたらず','その他事故'].includes(item);
        const sp=isMain?(sc.unitPrice||0):({夜間配送:31,大配送:72,'集荷①':80,'集荷②':80}[item]||0);
        pay+=qty*sp;
        cells+=`<td style="text-align:center;padding:4px 6px;font-size:12px;">${qty||'-'}</td>`;
      }
      baseAmt+=pay;
      const sCorpR=getCorpForStaff(s.name);
      return `<tr style="border-bottom:1px solid #f3f4f6;">
        <td style="padding:5px 8px;font-size:12px;">
          <div style="font-weight:600;">${s.name.replace(/[（(][^）)]+[）)]/g,'').trim()}</div>
          ${sCorpR?`<span style="font-size:9px;color:${sCorpR.color};background:${sCorpR.bg};border-radius:3px;padding:0 4px;">${sCorpR.label.replace(/株式会社|合同会社/g,'').trim()}</span>`:''}
        </td>
        ${cells}<td style="text-align:right;padding:5px 8px;font-weight:700;color:#7c3aed;">¥${Math.round(pay).toLocaleString()}</td>
      </tr>`;
    }).join('');
    grandTotal+=baseAmt;
    const iThs=items.map(it=>`<th style="padding:5px 4px;min-width:55px;text-align:center;font-size:11px;">${it}</th>`).join('');
    cards+=`<div style="background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden;">
      <div style="padding:12px 16px;background:#f8fafc;border-bottom:2px solid #e2e8f0;display:flex;justify-content:space-between;">
        <span style="font-weight:700;font-size:15px;">${bn}</span>
        <span style="font-size:14px;font-weight:700;color:#1e40af;">¥${Math.round(baseAmt).toLocaleString()}</span>
      </div>
      <div style="overflow-x:auto;padding:10px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#eff6ff;"><th style="padding:5px 8px;text-align:left;">スタッフ</th>${iThs}<th style="padding:5px 8px;text-align:right;">支払</th></tr></thead>
          <tbody>${staffRows}</tbody>
        </table>
      </div>
    </div>`;
  }
  const fromOpts=sortedDays.map(d=>`<option value="${d}" ${d===baseRangeFrom?'selected':''}>${d}日</option>`).join('');
  const toOpts=sortedDays.map(d=>`<option value="${d}" ${d===baseRangeTo?'selected':''}>${d}日</option>`).join('');
  return `
<div style="background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
  <span style="font-weight:600;font-size:13px;">集計期間：</span>
  <select class="form-select" style="width:90px;" onchange="baseRangeFrom=this.value;render();">${fromOpts}</select>
  <span>〜</span>
  <select class="form-select" style="width:90px;" onchange="baseRangeTo=this.value;render();">${toOpts}</select>
  <span style="font-size:13px;color:#64748b;">${from}日〜${to}日の集計</span>

function openNoticeDetail(nid){
  const n=NOTICES.find(x=>x.id===nid);if(!n)return;
  const s=getStaff(n.sid);
  // 個別条件からスタッフ名を逆引き（STAFF_CONDITIONSとの突合）
  const scMatch=STAFF_CONDITIONS.find(sc=>sc.name.replace(/[（(][^）)]+[）)]/g,'').trim()===s?.name||sc.name===s?.name)||null;
  const sc=scMatch?getStaffCond(scMatch.name):null;
  const pd=scMatch?getPreData(scMatch.name):null;
  // 件数集計（個別条件あり且つBASEデータあり）
  let countHtml='';
  let gross=n.total;
  let totalDeduct=0;
  if(sc&&scMatch){
    const from=pd?.fromDay||'1', to=pd?.toDay||'31';
    const counts=sumCountsFromBFData(scMatch.name,from,to)||{};
    const calc=calcPrePay(scMatch.name);
    gross=calc.gross;
    totalDeduct=calc.totalDeduct;
    const EXCL=['不在','持出個数'];
    const MAIN=['配達完了①','配達完了②','転居大口等①','転居大口等②','尋ねあたらず','その他事故'];
    const STDP={'夜間配送':31,'大配送':72,'集荷①':80,'集荷②':80};
    const rows=Object.entries(counts).filter(([i,q])=>q>0&&!EXCL.includes(i)).map(([i,q])=>{
      const p=MAIN.includes(i)?(sc.unitPrice||0):(STDP[i]||0);
      if(!p)return '';

function getCorpForStaff(name) {

// --- 標準控除カテゴリ ---
const DEDUCT_CATS = [
  { id:'gasoline',  label:'ガソリン代' },
  { id:'vehicle',   label:'車両貸出費用' },
  { id:'directpay', label:'滞納分直納' },

const corpCondOverrides = {}; // { corpId: { unitPrice, fixedFee, deductPlan:{}, cond } }

// --- 前払いデータ ---
const staffPreData = {};
function getPreData(name) {
  if (!staffPreData[name]) {
    staffPreData[name] = { fromDay:'1', toDay:'31', deductPlan:{}, customDeducts:[], prepayEntries:[] };
    const sc = getStaffCond(name);
    if (sc.rentalFee) staffPreData[name].deductPlan.vehicle = sc.rentalFee;
    // 法人条件の控除デフォルトを適用
    const corpId = sc.corpId || '';
    if (corpId && corpCondOverrides[corpId]?.deductPlan) {
      Object.assign(staffPreData[name].deductPlan, corpCondOverrides[corpId].deductPlan);
    }
  }
  return staffPreData[name];
}

// --- スタッフ情報取得 ---
function getStaffCond(name) {
  const base = STAFF_CONDITIONS.find(s => s.name === name) || {};
  const ov = staffCondOverrides[name];
  // 法人委託の場合は法人条件をベースに重ねる
  const corpId = (ov && ov.corpId) || base.corpId || '';
  const corpCond = (corpId && corpCondOverrides[corpId]) ? corpCondOverrides[corpId] : {};
  const merged = Object.assign({}, base, corpCond);
  if (ov) {
    for (const [k,v] of Object.entries(ov)) {
      if (v !== null && v !== undefined && v !== '') merged[k] = v;
    }
  }
  return merged;
}

// --- BASE_FULL_DATAからスタッフ件数を取得 ---
function normName(n) {
  return n.replace(/[（(][^）)]+[）)]/g,'').replace(/[\s　]/g,'');
}

function findStaffInBFData(scName) {
  const scNorm = normName(scName);
  for (const [bn, bd] of Object.entries(BASE_FULL_DATA)) {
    for (const s of (bd.staff||[])) {
      const bfNorm = normName(s.name);
      // 創栄サポート（水木勇貴）→水木勇貴のように逆順対応
      if (bfNorm === scNorm || bfNorm.includes(scNorm) || scNorm.includes(bfNorm)) {
        return { base: bn, staffObj: s };
      }
    }
  }
  return null;
}

function sumCountsFromBFData(scName, fromDay, toDay) {
  const found = findStaffInBFData(scName);
  if (!found) return null;
  const counts = {};
  const daily = found.staffObj.daily || {};
  const from = Number(fromDay || 1), to = Number(toDay || 31);
  for (const [day, data] of Object.entries(daily)) {
    if (Number(day) < from || Number(day) > to) continue;
    for (const [item, val] of Object.entries(data)) {
      counts[item] = (counts[item] || 0) + Number(val || 0);
    }
  }
  return counts;
}

// --- 支払試算 ---
function calcPayFromCounts(sc, counts) {
  if (!counts) return 0;
  const up = sc.unitPrice || 0;
  const stdP = { '夜間配送':31, '大配送':72, '集荷①':80, '集荷②':80 };
  const mainItems = ['配達完了①','配達完了②','転居大口等①','転居大口等②','尋ねあたらず','その他事故'];
  const excludeItems = ['不在','持出個数']; // 支払対象外
  let gross = 0;
  for (const [item, qty] of Object.entries(counts)) {
    if (!qty || excludeItems.includes(item)) continue;
    gross += qty * (mainItems.includes(item) ? up : (stdP[item]||0));
  }
  return gross;
}

function calcPrePay(name) {
  const pd = getPreData(name);
  const sc = getStaffCond(name);
  let gross = 0;
  if (sc.fixedFee) {
    gross = sc.fixedFee;
  } else {
    const counts = sumCountsFromBFData(name, pd.fromDay, pd.toDay) || pd.manualCounts || {};
    gross = calcPayFromCounts(sc, counts);
  }
  let totalDeduct = 0;
  for (const c of DEDUCT_CATS) totalDeduct += Number(pd.deductPlan[c.id]||0);
  for (const c of (pd.customDeducts||[])) totalDeduct += Number(c.amt||0);
  const alreadyPrepaid = (pd.prepayEntries||[]).reduce((s,e)=>s+Number(e.amt||0),0);
  const available = gross - totalDeduct - alreadyPrepaid;
  return { gross, totalDeduct, alreadyPrepaid, available };
}

function staffPayCalc(sc, counts) {
  if (!counts) counts = {'配達完了①':100,'配達完了②':0,'転居大口等①':5,'夜間配送':3,'大配送':2,'集荷①':4,'集荷②':0,'尋ねあたらず':2,'その他事故':1};
  if (sc.fixedFee) { const g=sc.fixedFee; const d=sc.rentalFee||0; return {gross:g,deduct:d,net:g-d,type:'fixed'}; }
  const g = calcPayFromCounts(sc, counts);
  const d = sc.rentalFee||0;
  return { gross:g, deduct:d, net:g-d, type:'unit' };
}

  const up = document.getElementById('ccond-unitprice')?.value;

  const deductPlan = {};
  for (const c of DEDUCT_CATS) {

  closeModalDirect(); render();

function saveStaffCond(name) {
  const up = document.getElementById('sced-unitprice')?.value;
  const ff = document.getElementById('sced-fixed')?.value;

  const corpId = (contract === '法人委託') ? (document.getElementById('sced-corpid')?.value || '') : '';
  staffCondOverrides[name] = {

    contract,
    corpId,
    role: document.getElementById('sced-role')?.value || '',
    vehicle: document.getElementById('sced-vehicle')?.value || '',
    unitPrice: up ? Number(up) : null,
    fixedFee: ff ? Number(ff) : null,
    rentalFee: Number(document.getElementById('sced-deduct-vehicle')?.value || 0),
    bankAccount: document.getElementById('sced-bank')?.value || '',
    cond: document.getElementById('sced-note')?.value || '',

  }
  closeModalDirect(); render();

  </div>`).join('')}

function buildResultHtml(calc) {
  const ac=calc.available>=0?'#1e40af':'#dc2626';
  return `
  <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e2e8f0;"><span>売上合計</span><strong>¥${calc.gross.toLocaleString()}</strong></div>
  <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e2e8f0;color:#dc2626;"><span>控除予定合計</span><span>−¥${calc.totalDeduct.toLocaleString()}</span></div>
  ${calc.alreadyPrepaid>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e2e8f0;color:#7c3aed;"><span>前払い申請済み</span><span>−¥${calc.alreadyPrepaid.toLocaleString()}</span></div>`:''}
  <div style="margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-weight:700;font-size:14px;">前払い可能額</span>
    <strong style="font-size:26px;color:${ac};">¥${calc.available.toLocaleString()}</strong>
  </div>
  ${calc.available<0?`<div style="background:#fee2e2;color:#991b1b;border-radius:4px;padding:6px 10px;font-size:12px;margin-top:6px;">⚠️ マイナスですが前払いに応じることも可能です</div>`:''}`;
}

function updatePrePayRange(name, which, val) {
  const pd=getPreData(name);
  if(which==='from') pd.fromDay=val; else pd.toDay=val;
  refreshPrePayResult(name);
  // Re-render to refresh counts table
  openPrePayModal(name);
}

function setManualGross(name, val) {
  const pd=getPreData(name);
  pd.manualGross=Number(val)||0;
  pd.manualCounts={'配達完了①': Math.round(pd.manualGross / (getStaffCond(name).unitPrice||1))};
  refreshPrePayResult(name);
}

function updatePrePayDeduct(name,catId,val) {
  getPreData(name).deductPlan[catId]=Number(val)||0;
  refreshPrePayResult(name);
}
function confirmDeduct(name) {
  const pd=getPreData(name);
  for(const c of DEDUCT_CATS){
    const el=document.getElementById('ppd_'+c.id);
    if(el) pd.deductPlan[c.id]=Number(el.value||0);
  }
  pd.deductConfirmed=true;
}
function editDeduct(name) {
  getPreData(name).deductConfirmed=false;
}
function addCustomDeduct(name) {
  getPreData(name).customDeducts.push({label:'',amt:0});
  const el=document.getElementById('custom-deducts-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.innerHTML=renderCustomDeducts(name);
}
function removeCustomDeduct(name,i) {
  getPreData(name).customDeducts.splice(i,1);
  const el=document.getElementById('custom-deducts-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.innerHTML=renderCustomDeducts(name);
  refreshPrePayResult(name);
}
function updateCustomDeduct(name,i,field,val) {
  const c=getPreData(name).customDeducts[i];
  c[field]=field==='amt'?Number(val)||0:val;
  refreshPrePayResult(name);
}
function addPrepayEntry(name) {
  getPreData(name).prepayEntries.push({date:'',amt:0});
  openPrePayModal(name);
}
function removePrepayEntry(name,i) {
  getPreData(name).prepayEntries.splice(i,1);
  openPrePayModal(name);
}
function updatePrepayEntry(name,i,field,val) {
  const e=getPreData(name).prepayEntries[i];
  e[field]=field==='amt'?Number(val)||0:val;
  refreshPrePayResult(name);
}
function refreshPrePayResult(name) {
  const el=document.getElementById('prepay-result-'+name.replace(/[^a-z0-9]/gi,'_'));
  if(!el) return;
  el.innerHTML=buildResultHtml(calcPrePay(name));
}
function renderCustomDeducts(name) {
  return (getPreData(name).customDeducts||[]).map((c,i)=>`
<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
  <input type="text" value="${c.label||''}" placeholder="項目名" style="width:100px;border:1px solid #fed7aa;border-radius:4px;padding:2px 5px;font-size:12px;"
    onchange="updateCustomDeduct('${name}',${i},'label',this.value)">
  <input type="number" value="${c.amt||0}" style="width:80px;border:1px solid #fed7aa;border-radius:4px;padding:2px 6px;text-align:right;font-size:12px;"
    onchange="updateCustomDeduct('${name}',${i},'amt',this.value)">
  <span style="font-size:11px;color:#64748b;">円</span>
  <button onclick="removeCustomDeduct('${name}',${i})" style="border:none;background:#fee2e2;color:#dc2626;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:11px;">×</button>
</div>`).join('');
}

function openApproverSelect(name) {
  const shortName=name.replace(/[（(][^）)]+[）)]/g,'').trim();
  const now=new Date();
  const defaultMonth=now.getFullYear()+'年'+(now.getMonth()+1)+'月';
  openModal('承認者・対象月を選択', `
<div style="font-size:13px;color:#64748b;margin-bottom:14px;">${shortName} の前払依頼書の承認者を選択してください。</div>
<div class="form-group">
  <label class="form-label">対象月</label>
  <input type="text" id="target-month-input" class="form-input" value="${defaultMonth}" placeholder="例: 2026年7月">
</div>
<div class="form-group">
  <label class="form-label">承認者</label>
  <select class="form-select" id="approver-select" style="width:100%;">
    ${approvers.map(a=>`<option value="${a}">${a}</option>`).join('')}
  </select>
</div>
<div style="display:flex;gap:8px;margin-top:10px;">
  <input type="text" id="new-approver-input" placeholder="承認者名を追加" class="form-input" style="flex:1;">
  <button onclick="addApprover()" class="btn btn-outline" style="white-space:nowrap;">追加</button>
</div>
<div id="approver-list" style="margin-top:10px;font-size:12px;color:#64748b;">
  ${approvers.map((a,i)=>`<span style="background:#f1f5f9;border-radius:4px;padding:2px 8px;margin-right:4px;margin-bottom:4px;display:inline-block;">${a} <span onclick="removeApprover(${i})" style="cursor:pointer;color:#dc2626;">×</span></span>`).join('')}
</div>`,
  `<button class="btn btn-outline" onclick="closeModalDirect()">キャンセル</button>
   <button class="btn btn-primary" onclick="printPrepayRequest('${name.replace(/'/g,"\\'")}',document.getElementById('approver-select')?.value,document.getElementById('target-month-input')?.value)">印刷</button>`
  );
}

function addApprover() {
  const el=document.getElementById('new-approver-input');
  const name=el?.value?.trim();
  if(!name) return;
  approvers.push(name);
  el.value='';
  const sel=document.getElementById('approver-select');
  if(sel){sel.innerHTML=approvers.map(a=>`<option value="${a}">${a}</option>`).join('');sel.value=name;}
  const list=document.getElementById('approver-list');
  if(list) list.innerHTML=approvers.map((a,i)=>`<span style="background:#f1f5f9;border-radius:4px;padding:2px 8px;margin-right:4px;margin-bottom:4px;display:inline-block;">${a} <span onclick="removeApprover(${i})" style="cursor:pointer;color:#dc2626;">×</span></span>`).join('');
}
function removeApprover(i) {
  approvers.splice(i,1);
  const list=document.getElementById('approver-list');
  if(list) list.innerHTML=approvers.map((a,j)=>`<span style="background:#f1f5f9;border-radius:4px;padding:2px 8px;margin-right:4px;margin-bottom:4px;display:inline-block;">${a} <span onclick="removeApprover(${j})" style="cursor:pointer;color:#dc2626;">×</span></span>`).join('');
  const sel=document.getElementById('approver-select');
  if(sel) sel.innerHTML=approvers.map(a=>`<option value="${a}">${a}</option>`).join('');
}

  .sign-box .lbl{font-size:11px;color:#64748b;}

  .nyukin-header{background:#1e3a5f;color:white;padding:11px 16px;font-size:14px;font-weight:700;letter-spacing:.06em;}
  .nyukin-entry{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-left:4px solid #1e3a5f;border-right:1px solid #bfdbfe;border-bottom:1px solid #bfdbfe;background:#f8faff;}

  @media print{body{margin:10px;}}

<div class="info-grid">
  <div><div class="lbl">氏名</div><div class="val">${shortName}</div></div>

</div>
<script>window.onload=function(){window.print();}<\/script>

  win.document.close();

// ============================================================
// MODAL
// ============================================================
function openModal(title, body, footer){
  document.getElementById('modal-title').innerHTML=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer||'';
  const ov=document.getElementById('modal-overlay');
  ov.style.display='flex';
  requestAnimationFrame(()=>ov.classList.add('open'));
}
function closeModal(e){if(e.target===e.currentTarget)closeModalDirect();}
function closeModalDirect(){
  const ov=document.getElementById('modal-overlay');
  ov.classList.remove('open');
  setTimeout(()=>ov.style.display='none',200);
}
